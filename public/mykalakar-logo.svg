<svg xmlns="http://www.w3.org/2000/svg" viewBox="62 8 116 172" role="img" aria-labelledby="title desc">
  <title id="title">MyKalakar logo</title>
  <desc id="desc">A polished orange and navy flame-shaped cultural mark.</desc>
  <defs>
    <radialGradient id="orangeGrad" cx="36%" cy="20%" r="82%">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="46%" stop-color="#FF8A1C"/>
      <stop offset="100%" stop-color="#D94708"/>
    </radialGradient>
    <linearGradient id="navyGrad" x1="97" x2="154" y1="52" y2="169" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F5584"/>
      <stop offset="52%" stop-color="#11294B"/>
      <stop offset="100%" stop-color="#081423"/>
    </linearGradient>
    <radialGradient id="sphereGrad" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#244D74"/>
      <stop offset="100%" stop-color="#081423"/>
    </radialGradient>
    <filter id="logoShadow" x="-18%" y="-12%" width="136%" height="130%">
      <feDropShadow dx="1.5" dy="5" stdDeviation="5" flood-color="#9A3412" flood-opacity="0.22"/>
    </filter>
  </defs>
  <path
    d="M100 15
       C130 15, 168 45, 168 85
       C168 118, 148 140, 128 155
       C115 163, 103 168, 100 168
       C100 168, 88 148, 85 125
       C82 105, 88 88, 88 75
       C88 55, 75 38, 72 30
       C80 18, 90 15, 100 15Z"
    fill="url(#orangeGrad)"
    filter="url(#logoShadow)"
  />
  <path
    d="M100 168
       C97 168, 85 148, 82 122
       C79 98, 92 80, 95 62
       C97 48, 95 35, 100 25
       C104 36, 140 55, 148 88
       C155 115, 140 148, 100 168Z"
    fill="url(#navyGrad)"
    opacity="0.96"
  />
  <circle cx="103" cy="98" r="14" fill="url(#sphereGrad)"/>
  <circle cx="98" cy="93" r="4" fill="#FFFFFF" opacity="0.18"/>
</svg>
