<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="orangeGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#E85D04"/>
    </radialGradient>
    <radialGradient id="navyGrad" cx="60%" cy="70%" r="70%">
      <stop offset="0%" stop-color="#007A9F"/>
      <stop offset="100%" stop-color="#0B131F"/>
    </radialGradient>
    <radialGradient id="sphereGrad" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#1A2332"/>
      <stop offset="100%" stop-color="#0B131F"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#E85D04" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Orange outer flame curve -->
  <path
    d="M100 15
       C130 15, 168 45, 168 85
       C168 118, 148 140, 128 155
       C115 163, 103 168, 100 168
       C100 168, 88 148, 85 125
       C82 105, 88 88, 88 75
       C88 55, 75 38, 72 30
       C80 18, 90 15, 100 15Z"
    fill="url(#orangeGrad)"
    filter="url(#shadow)"
  />

  <!-- Navy inner curve — swoops inward from bottom right -->
  <path
    d="M100 168
       C97 168, 85 148, 82 122
       C79 98, 92 80, 95 62
       C97 48, 95 35, 100 25
       C104 36, 140 55, 148 88
       C155 115, 140 148, 100 168Z"
    fill="url(#navyGrad)"
    opacity="0.92"
  />

  <!-- Central sphere highlight -->
  <circle cx="103" cy="98" r="14" fill="url(#sphereGrad)"/>
  <circle cx="98" cy="93" r="4" fill="rgba(255,255,255,0.15)"/>
</svg>
