<!doctype html>
<html lang="en" class="notranslate" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <title>MyKalakar | Discover & Book Premium Artists in India</title>
    <meta name="description" content="Discover and book verified artists for weddings, corporate events & more on MyKalakar – India's premier artist booking platform." />
    <meta name="author" content="MyKalakar" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mykalakar.com/" />
    <meta property="og:title" content="MyKalakar – India's Premier Artist Booking Platform" />
    <meta property="og:description" content="Discover and book verified artists for weddings, corporate events & more on MyKalakar." />
    <meta property="og:image" content="/mykalakar-logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MyKalakar – India's Premier Artist Booking Platform" />
    <meta name="twitter:description" content="Discover and book verified artists for weddings, corporate events & more on MyKalakar." />
    <meta name="twitter:image" content="/mykalakar-logo.png" />

    <!-- ── Non-Blocking Font Delivery ─────────────────────────────────── -->
    <!-- Step 1: DNS prefetch + preconnect to eliminate connection overhead -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Step 2: Non-blocking stylesheet with display=swap prevents render-blocking -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Poppins:wght@600;700;800;900&family=Noto+Sans+Devanagari:wght@400;500;600;700;800&display=swap"
    />
    <!-- ──────────────────────────────────────────────────────────────── -->

    <link rel="preload" as="image" href="/assets/hero-slider/mykalakar-platform-montage.jpeg" fetchpriority="high" />
    <link rel="preload" as="image" href="/mykalakar-logo.png" fetchpriority="high" />
    <link rel="icon" type="image/png" href="/mykalakar-logo.png" />
  </head>

  <body>
    <script>
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
